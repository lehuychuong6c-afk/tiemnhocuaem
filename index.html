<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiệm Của Em</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Quicksand',sans-serif;margin:0;background:#f5f7fb}
header{background:linear-gradient(135deg,#ff8fb1,#ff5c8a);color:#fff;padding:20px;text-align:center}
.topbar{padding:10px}
input{width:100%;padding:10px;border-radius:20px;border:none;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:15px;padding:10px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.card img{width:100%;height:120px;object-fit:cover;border-radius:10px}
.price{color:#ff4d6d;font-weight:bold}
button{background:#ff8fb1;border:none;padding:6px 10px;border-radius:20px;color:#fff;cursor:pointer}
#cart{position:fixed;right:0;top:0;width:280px;height:100%;background:#fff;padding:15px;display:none}
.menu{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:10px}
</style>
</head>

<body>

<header>
🧋 Tiệm Của Em  
<p>Ngon – Rẻ – Ghiền là quay lại 💖</p>
</header>

<div class="topbar">
<input placeholder="Tìm món..." onkeyup="searchFood(this.value)">
</div>

<div class="container">

<!-- TRÀ SỮA -->
<div class="card" data-name="trà sữa">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQWPMD9odYo7_pTsqkZex8O4RQYgkJ2k-9sIA&s">
<h4>Trà sữa trân châu</h4>
<p class="price">30.000đ</p>
<button onclick="add('Trà sữa',30000)">Thêm</button>
</div>

<!-- GÀ RÁN -->
<div class="card" data-name="gà rán">
<img src="https://i.ytimg.com/vi/2DZT0ZK_kzY/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDDw6-e6KohLx4J1iywuiYctt31aw">
<h4>Gà rán</h4>
<p class="price">50.000đ</p>
<button onclick="add('Gà rán',50000)">Thêm</button>
</div>

<!-- MÌ CAY -->
<div class="card" data-name="mì cay">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSARi7nsacA7f-bpfEO-smPAnCTl2YbfZq0pQ&s">
<h4>Mì cay</h4>
<p class="price">35.000đ</p>
<button onclick="add('Mì cay',35000)">Thêm</button>
</div>

<!-- XÚC XÍCH -->
<div class="card" data-name="xúc xích">
<img src="https://www.huggies.com.vn/-/media/Project/xuc-xich-bao-nhieu-calo-30.jpeg">
<h4>Xúc xích nướng</h4>
<p class="price">20.000đ</p>
<button onclick="add('Xúc xích',20000)">Thêm</button>
</div>

<!-- BIM BIM -->
<div class="card" data-name="bim bim">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Potato-Chips.jpg">
<h4>Bim bim (Snack)</h4>
<p class="price">15.000đ</p>
<button onclick="add('Bim bim',15000)">Thêm</button>
</div>

<!-- KHÔ GÀ -->
<div class="card" data-name="khô gà">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTheNQWIbu1fzklMnzmjSui81GQnPeCjaxMgQ&s">
<h4>Khô gà lá chanh</h4>
<p class="price">45.000đ</p>
<button onclick="add('Khô gà',45000)">Thêm</button>
</div>

</div>

<!-- GIỎ HÀNG -->
<div id="cart">
<h3>🛒 Giỏ hàng</h3>
<ul id="items"></ul>
<p><b>Tổng:</b> <span id="total">0</span>đ</p>
<button onclick="checkout()">Thanh toán</button>
</div>

<!-- MENU DƯỚI -->
<div class="menu">
<div onclick="toggleCart()">🛒<br>Giỏ hàng</div>
<div onclick="location.reload()">🏠<br>Trang chủ</div>
</div>

<script>
let cart=[];

function add(name,price){
cart.push({name,price});
render();
}

function render(){
let list=document.getElementById('items');
list.innerHTML='';
let total=0;

cart.forEach(i=>{
let li=document.createElement('li');
li.innerText=i.name+' - '+i.price+'đ';
list.appendChild(li);
total+=i.price;
});

document.getElementById('total').innerText=total;
}

function toggleCart(){
let c=document.getElementById('cart');
c.style.display=c.style.display==='block'?'none':'block';
}

function checkout(){
alert('Đặt hàng thành công 🎉');
cart=[];
render();
}

function searchFood(value){
value=value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.dataset.name.includes(value)?'block':'none';
});
}
</script>

</body>
</html>
